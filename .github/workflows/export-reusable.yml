name: Export (Reusable)

# Reusable workflow: export Dataverse solutions from a dev environment and commit
# the unpacked changes back to the repository.
#
# Call this from your repo's EXPORT.yml:
#   uses: ALM4Dataverse/ALM4Dataverse/.github/workflows/export-reusable.yml@stable
#
# CREDENTIALS — three supported approaches (see docs/config/github-secrets.md):
#
#   1. Workload Identity Federation / OIDC (recommended — no secrets to manage):
#      Configure a federated credential on your App Registration trusting
#      https://token.actions.githubusercontent.com with subject
#      repo:{owner}/{repo}:environment:{environment-name}.
#      Store AZURE_CLIENT_ID, AZURE_TENANT_ID and DATAVERSE_URL in the GitHub
#      environment.  Do NOT set AZURE_CLIENT_SECRET.
#
#   2. GitHub Environments with client secret (Teams/Enterprise for approval gates):
#      Store AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET and DATAVERSE_URL
#      as secrets/variables in a GitHub environment named after the dev environment
#      (e.g. "Dev-main").  Pass that name via `environment-name`.
#
#   3. Prefixed global secrets (works on all licence levels):
#      Store secrets at repo level with environment-specific prefixes, then pass
#      them explicitly via the `secrets:` block when calling this workflow.

on:
  workflow_call:
    inputs:
      commit-message:
        required: true
        type: string
        description: 'Commit message for the exported changes'
      environment-name:
        required: true
        type: string
        description: >
          Name of the GitHub environment to use (e.g. "Dev-main").
          If the environment does not exist in GitHub it will be created automatically
          with no protection rules.  Used to resolve AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
          AZURE_TENANT_ID and DATAVERSE_URL from GitHub environment secrets/variables
          when those are not passed explicitly.
      dataverse-url:
        type: string
        default: ''
        description: >
          URL of the Dataverse environment to export from
          (e.g. https://yourorg-dev.crm.dynamics.com).
          If omitted, DATAVERSE_URL from the GitHub environment is used.
      dev-environment-label:
        type: string
        default: ''
        description: >
          Label passed to the export script as EnvironmentName (used in log messages).
          Defaults to "Dev-{branch}" when omitted.
      alm-repository:
        type: string
        default: 'ALM4Dataverse/ALM4Dataverse'
        description: 'ALM4Dataverse repository to use (change this if you are using a fork)'
      alm-ref:
        type: string
        default: 'stable'
        description: 'ALM4Dataverse git ref (tag or branch) to use'
    secrets:
      azure-client-id:
        required: false
        description: >
          Azure app registration client ID.
          If omitted, AZURE_CLIENT_ID from the GitHub environment is used.
      azure-client-secret:
        required: false
        description: >
          Azure client secret value.
          Not required when using Workload Identity Federation (OIDC).
          If omitted, AZURE_CLIENT_SECRET from the GitHub environment is used (or
          left unset when using WIF).
      azure-tenant-id:
        required: false
        description: >
          Azure tenant (directory) ID.
          If omitted, AZURE_TENANT_ID from the GitHub environment is used.

jobs:
  export:
    runs-on: windows-latest
    environment: ${{ inputs.environment-name }}
    permissions:
      contents: write  # push changes back to the repository
      id-token: write  # request OIDC token for Workload Identity Federation
    env:
      # Prefer an explicitly passed workflow secret; fall back to the GitHub environment secret.
      AZURE_CLIENT_ID:     ${{ secrets.azure-client-id     || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:     ${{ secrets.azure-tenant-id     || secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.azure-client-secret || secrets.AZURE_CLIENT_SECRET }}
      # Prefer explicit input; fall back to GitHub environment variable / secret.
      DATAVERSE_URL: ${{ inputs.dataverse-url || vars.DATAVERSE_URL || secrets.DATAVERSE_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: self
          persist-credentials: true
          fetch-depth: 1

      - name: Checkout ALM4Dataverse
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.alm-repository }}
          ref: ${{ inputs.alm-ref }}
          path: alm

      - name: Set up Workload Identity Federation (if no client secret)
        shell: pwsh
        run: |
          # When AZURE_CLIENT_SECRET is absent, obtain an OIDC token from GitHub
          # and write it to a temp file so that DefaultAzureCredential can use
          # WorkloadIdentityCredential automatically.
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_SECRET)) {
            Write-Host "No client secret provided — using Workload Identity Federation (OIDC)"
            if ([string]::IsNullOrEmpty($env:ACTIONS_ID_TOKEN_REQUEST_URL)) {
              throw ("AZURE_CLIENT_SECRET is not set and OIDC token request URL is not available. " +
                     "Ensure the workflow job has 'id-token: write' permission.")
            }
            $tokenUrl = "$($env:ACTIONS_ID_TOKEN_REQUEST_URL)&audience=api://AzureADTokenExchange"
            $headers  = @{
              Authorization = "Bearer $($env:ACTIONS_ID_TOKEN_REQUEST_TOKEN)"
              Accept        = "application/json"
            }
            $oidcToken = (Invoke-RestMethod -Uri $tokenUrl -Headers $headers).value
            $tokenFile = Join-Path $env:RUNNER_TEMP "azure_oidc_token.txt"
            [System.IO.File]::WriteAllText($tokenFile, $oidcToken)
            "AZURE_FEDERATED_TOKEN_FILE=$tokenFile" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "OIDC token written to $tokenFile"
          } else {
            Write-Host "Client secret provided — using client secret authentication"
          }

      - name: Install Dependencies
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          & "${{ github.workspace }}/alm/pipelines/scripts/installdependencies.ps1"

      - name: Connect and Export
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          $devEnvLabel = '${{ inputs.dev-environment-label }}'
          if ([string]::IsNullOrEmpty($devEnvLabel)) {
            $devEnvLabel = "Dev-${{ github.ref_name }}"
          }
          & "${{ github.workspace }}/alm/pipelines/scripts/connect.ps1" -Url $env:DATAVERSE_URL
          & "${{ github.workspace }}/alm/pipelines/scripts/export.ps1" `
            -SourceDirectory "${{ github.workspace }}/self" `
            -ArtifactStagingDirectory "${{ runner.temp }}/export-staging" `
            -TempDirectory "${{ runner.temp }}/export-temp" `
            -EnvironmentName $devEnvLabel

      - name: Commit and push changes
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          if ($LASTEXITCODE -ne 0) { throw "git config user.email failed with exit code $LASTEXITCODE" }
          git config user.name "${{ github.actor }}"
          if ($LASTEXITCODE -ne 0) { throw "git config user.name failed with exit code $LASTEXITCODE" }
          git add .
          if ($LASTEXITCODE -ne 0) { throw "git add failed with exit code $LASTEXITCODE" }
          $status = git status --porcelain
          if ([string]::IsNullOrEmpty($status)) {
            Write-Host "No changes to commit"
          } else {
            git commit -m "${{ inputs.commit-message }}"
            if ($LASTEXITCODE -ne 0) { throw "git commit failed with exit code $LASTEXITCODE" }
            git push origin HEAD:${{ github.ref }}
            if ($LASTEXITCODE -ne 0) { throw "git push failed with exit code $LASTEXITCODE" }
          }
